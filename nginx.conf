##############################################################################
# nginx.conf — Hardened Reverse Proxy for Oh Polly
# Security Level: Enterprise
# ─────────────────────────────────────────────────────────────────────────────
# Implements: TLS 1.2/1.3 only, HSTS preload, OCSP stapling, rate limiting,
# strong ciphers, security headers, Gzip, HTTP→HTTPS redirect.
##############################################################################

# Run as non-root user
user                nginx;
worker_processes    auto;
error_log           /var/log/nginx/error.log warn;
pid                 /var/run/nginx.pid;

events {
  worker_connections 4096;
  use                epoll;
  multi_accept       on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Hide Nginx version ────────────────────────────────────────────────────
  server_tokens off;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

  access_log  /var/log/nginx/access.log  main;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   65;
  types_hash_max_size 2048;

  # ── Gzip (disable for sensitive responses) ────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types        text/plain text/css application/json application/javascript text/xml application/xml;
  # BREACH/CRIME: disable gzip for responses containing secrets
  gzip_disable      "MSIE [1-6]\.";

  # ── Buffer limits — prevent buffer overflow attacks ───────────────────────
  client_body_buffer_size     16k;
  client_header_buffer_size   1k;
  client_max_body_size        10m;
  large_client_header_buffers 4 8k;
  client_body_timeout         12s;
  client_header_timeout       12s;
  send_timeout                10s;

  # ── Rate Limiting Zones ───────────────────────────────────────────────────
  # Global zone: 100 req/s per IP
  limit_req_zone  $binary_remote_addr zone=global:20m    rate=100r/s;
  # API zone: 20 req/s per IP
  limit_req_zone  $binary_remote_addr zone=api:10m       rate=20r/s;
  # Auth zone: 5 req/min per IP (strict)
  limit_req_zone  $binary_remote_addr zone=auth:5m       rate=5r/m;
  # Static assets: generous
  limit_req_zone  $binary_remote_addr zone=static:10m    rate=200r/s;

  limit_req_status 429;

  # ── Connection Limits ─────────────────────────────────────────────────────
  limit_conn_zone $binary_remote_addr zone=addr:10m;
  limit_conn      addr 30;

  # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Main HTTPS Server ─────────────────────────────────────────────────────
  server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS Configuration ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # TLS 1.2 and 1.3 ONLY — disable SSLv3, TLS 1.0, TLS 1.1
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites — forward secrecy preferred
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # DH parameters (generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # OCSP stapling — improves TLS handshake performance + privacy
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Session cache
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # disable for forward secrecy

    # ── Security Headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "DENY"                                         always;
    add_header X-Content-Type-Options       "nosniff"                                      always;
    add_header X-XSS-Protection             "1; mode=block"                                always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                                  always;
    add_header Cross-Origin-Embedder-Policy "require-corp"                                 always;
    add_header Cross-Origin-Resource-Policy "same-site"                                    always;

    # Content-Security-Policy — strict, nonce-based in production
    add_header Content-Security-Policy "
      default-src 'self';
      script-src 'self' https://js.stripe.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.stripe.com;
      frame-src https://js.stripe.com https://hooks.stripe.com;
      connect-src 'self' https://api.stripe.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
      block-all-mixed-content;
    " always;

    # ── Root — Serve React SPA ─────────────────────────────────────────────
    root  /var/www/ohpolly/dist;
    index index.html;

    location / {
      limit_req zone=global burst=50 nodelay;
      try_files $uri $uri/ /index.html;

      # Cache static assets aggressively
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
      }

      # Never cache HTML (SPA shell must always be fresh)
      location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
      }
    }

    # ── API Proxy ──────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=30 nodelay;

      proxy_pass         http://127.0.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      # Don't forward sensitive headers
      proxy_hide_header  X-Powered-By;
      proxy_hide_header  Server;

      # Timeouts
      proxy_connect_timeout 5s;
      proxy_send_timeout    10s;
      proxy_read_timeout    30s;
    }

    # ── Auth Endpoints — stricter rate limit ───────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;

      proxy_pass         http://127.0.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block common attack paths ──────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|rb|pl|env|git|htaccess|htpasswd|sql|bak|conf|log)$ {
      deny all;
      return 404;
    }

    location ~* /\. {
      deny all;
      return 404;
    }

    # ── Security.txt ───────────────────────────────────────────────────────
    location /.well-known/security.txt {
      alias /var/www/ohpolly/security.txt;
    }

    # ── Robots.txt ────────────────────────────────────────────────────────
    location /robots.txt {
      alias /var/www/ohpolly/dist/robots.txt;
    }

    # ── Error pages ───────────────────────────────────────────────────────
    error_page 404              /index.html;
    error_page 500 502 503 504  /50x.html;
    location = /50x.html {
      root /usr/share/nginx/html;
    }
  }
}
