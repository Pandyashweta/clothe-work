##############################################################################
# docker-compose.yml — Secure Container Orchestration
# Security Level: Enterprise / Least Privilege
# ─────────────────────────────────────────────────────────────────────────────
# Implements: non-root containers, read-only filesystems, seccomp profiles,
# no-new-privileges, network isolation, secrets management, health checks.
##############################################################################

version: "3.9"

services:

  # ── Express API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: ohpolly/api:latest
    container_name: ohpolly_api
    restart: unless-stopped

    # Security: Run as non-root user (defined in Dockerfile)
    user: "1001:1001"

    # Security: Read-only filesystem, only writable volumes explicitly mounted
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /app/logs:mode=0700,uid=1001

    environment:
      NODE_ENV: production
      PORT: 5000

    # NEVER hardcode secrets here — use Docker secrets or .env files not committed to git
    env_file:
      - ./backend/.env.production

    # Security: Drop all Linux capabilities, add only what's needed
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # only if binding to port <1024 (not needed for 5000)

    # Security: No privilege escalation
    security_opt:
      - no-new-privileges:true
      - seccomp:/etc/docker/seccomp/default.json

    # No direct port exposure — only accessible via nginx on internal network
    expose:
      - "5000"

    # Isolated network (not directly exposed to internet)
    networks:
      - internal

    # Health check
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    volumes:
      - api_logs:/app/logs
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    # Resource limits — prevents DoS from resource exhaustion
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ohpolly_nginx
    restart: unless-stopped

    # Security: non-root nginx
    user: "101:101"

    read_only: true
    tmpfs:
      - /var/cache/nginx:mode=0700,uid=101
      - /var/run:mode=0755,uid=101

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/var/www/ohpolly/dist:ro
      - nginx_logs:/var/log/nginx
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

    depends_on:
      api:
        condition: service_healthy

    networks:
      - internal
      - external

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Certbot — Let's Encrypt certificate renewal ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: ohpolly_certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renew certificates every 12 hours (checks but only renews when near expiry)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    profiles:
      - production

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  external:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  internal:
    driver: bridge
    internal: true  # NOT connected to internet — only accessible within docker network
    ipam:
      config:
        - subnet: 172.21.0.0/24

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  api_logs:
    driver: local
  nginx_logs:
    driver: local
  letsencrypt:
    driver: local
  certbot_webroot:
    driver: local
